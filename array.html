<!doctype html>
<html lang="en">
  <head>
    <meta name="robots" content="noindex, nofollow" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>frugt</h1>
    <ul id="frugt"></ul>

    <script>
      const frugter = ["æble", "pærer", "banan", "kiwi"];

      const liste = document.querySelector("ul");

      frugter.forEach(lavFrugtListe);

      function lavFrugtListe(frugt) {
        liste.innerHTML += `<li>${frugt}</li>`;
      }
    </script>
  </body>
</html>
